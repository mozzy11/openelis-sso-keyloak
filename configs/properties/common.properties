# BMP SMS provider: TWILIO, AFRICA_TALKING, or LEGACY
# TWILIO: HTTP POST to Twilio API (global coverage)
# AFRICA_TALKING: HTTP POST to Africa's Talking API (Africa only)
# LEGACY: original HTTP GET with UserName, PassWord, Number query params
#
# For TWILIO, configure the BMP_SMS_SERVER external connection with:
#   URI: (leave blank - auto-constructed from Account SID)
#   Username: your Twilio Account SID
#   Password: your Twilio Auth Token
# And set the from number below.
#
# For AFRICA_TALKING, configure the BMP_SMS_SERVER external connection with:
#   URI: https://api.africastalking.com/version1/messaging
#   Username: your Africa's Talking username
#   Password: your Africa's Talking API key
org.openelisglobal.notification.bmp.provider=TWILIO

# Twilio "From" phone number (your Twilio number, E.164 format e.g. +1234567890)
org.openelisglobal.notification.twilio.from=

